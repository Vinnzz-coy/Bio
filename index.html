<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin bio Link Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background">
    </div>
    <div class="container">
        <div class="card">
            <div class="profile">
                <div class="avatar">
                    <img src="img/pp.png" alt="Profile" id="profileImg">
                    <div class="status"></div>
                </div>
                <h1 class="name">Kevin Nazar</h1>

                <div class="stats">

                        <span class="number">3000K+</span>

                    </div>
                    <div class="divider"></div>
                    <div class="stat">
                        <span class="number">10+</span>
                        <span class="label">Projects</span>
                    </div>
                </div>
            </div>

            <div class="links">
                <div class="section-title">
                    <span>CONNECT</span>
                </div>

                <a href="https://whatsapp.com/channel/0029Vb4f6xp8KMqt9kzMfP0V" class="link whatsapp" target="_blank">
                    <div class="link-icon">
                        <img src="img/whatsapp.png" alt="WhatsApp">
                    </div>
                    <div class="link-content">
                        <span class="link-name">Saluran WhatsApp</span>
                        <span class="link-desc">Berbagi info😁</span>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>

                <a href="https://vinnzz.passio.eco" class="link Afiliasi" target="_blank">
                    <div class="link-icon">
                        <img src="img/afiliasi.jpg" alt="Afiliasi">
                    </div>
                    <div class="link-content">
                        <span class="link-name">Produk afiliasi</span>
                        <span class="link-desc">buat tambahan uang jajan pkl😔</span>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>

                <a href="https://lynk.id/kevinnazar" class="link website" target="_blank">
                    <div class="link-icon">
                        <img src="img/digital product.jpeg" alt="Website">
                    </div>
                    <div class="link-content">
                        <span class="link-name">Digital Products</span>
                        <span class="link-desc">nyari duit</span>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>

                <a href="https://saweria.co/NovaVibe" class="link saweria" target="_blank">
                    <div class="link-icon">
                        <img src="img/Saweria.png" alt="Saweria">
                    </div>
                    <div class="link-content">
                        <span class="link-name">MediaShare Saweria</span>
                        <span class="link-desc">Kali aja ada yang mau donate 😁</span>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>

                <a href="https://vinnzz-coy.github.io/Protofolio-web/" class="link cv" target="_blank">
                    <div class="link-icon">
                        <img src="img/CV.jpeg" alt="CV">
                    </div>
                    <div class="link-content">
                        <span class="link-name">Portofolio</span>
                        <span class="link-desc">Lihat CV saya</span>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>
            </div>



            <div class="footer">
                <p>© 2025 • Hai aku Kevin Nazar <span class="heart">♥</span></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>

</html>
